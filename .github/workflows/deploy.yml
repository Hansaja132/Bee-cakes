name: Deploy website via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: Upload files to hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate runtime config
        env:
          FORMSPREE_ENDPOINT: ${{ secrets.FORMSPREE_ENDPOINT }}
        run: |
          mkdir -p js
          printf "window.FORMSPREE_ENDPOINT = '%s';\n" "$FORMSPREE_ENDPOINT" > js/config.js

      - name: Upload site over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            .git
            .git/
            .gitignore
            .github
            .github/**
            .env
            .env.local
            node_modules
            node_modules/**
            .DS_Store
            *.md
            .prettier*